version: '3'

tasks:
  build:
    desc: Build the CLI binary
    cmds:
      - go build -o review-guesser ./cmd/review-guess
      - echo "✓ Build complete! Run with ./review-guesser"

  run:
    desc: Run the game
    cmds:
      - go run ./cmd/review-guess

  test:
    desc: Run all tests
    cmds:
      - go test -v ./...

  test:coverage:
    desc: Run tests with coverage
    cmds:
      - go test -v -cover ./...

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f review-guesser
      - go clean

  deps:
    desc: Download and tidy dependencies
    cmds:
      - go mod download
      - go mod tidy

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  lint:
    desc: Run linter (requires golangci-lint)
    cmds:
      - golangci-lint run ./...

  help:
    desc: Show this help message
    cmds:
      - task -l
