version: '3'

tasks:
  build:
    desc: Build the API binary
    cmds:
      - go build -o review-guess ./cmd/review-guess
      - echo "✓ Build complete! Run with ./review-guess"

  run:
    desc: Run the API server
    cmds:
      - go run ./cmd/review-guess

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f review-guess
      - go clean

  deps:
    desc: Download and tidy dependencies
    cmds:
      - go mod download
      - go mod tidy

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  help:
    desc: Show this help message
    cmds:
      - task -l
